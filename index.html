<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신용카드 현금화 빠르고 안전하게</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f6ebd9;
    }

    /* 휴대폰 화면에 맞춰 배경 이미지 설정 */
    body {
      background-image: url('bg_mobile.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: contain;
      min-height: 100vh;
      position: relative;
    }

    /* ⚠️ 이미지 속 하단 흰색 입력창 구역 바로 위에 투명하게 얹어놓는 박스 */
.form-overlay {
      position: absolute;
      bottom: 2%; 
      left: 50%;  
      transform: translateX(-50%); 
      width: 85%;  
      max-width: 340px; 
      height: 160px; /* 세로 배열에 맞게 구역 높이 최적화 */
      box-sizing: border-box;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    /* 실제 입력이 가능한 투명 투입구 배치 */
.input-row {
      display: flex;
      flex-direction: column; /* 세로로 한 칸씩 쌓이게 만드는 명령어 */
      gap: 8px; /* 성함 칸과 전화번호 칸 사이의 간격 */
    }

    /* 3. 입력창 자체의 세로 높이를 살짝 줄여 더 깔끔하게 만듦 */
    .real-input {
      width: 100%;
      height: 40px; /* 44px에서 40px로 조절하여 콤팩트하게 변경 */
      padding: 0 12px;
      border: 1px solid #cccccc;
      border-radius: 6px;
      font-size: 14px;
      background-color: rgba(255, 255, 255, 0.95); 
      box-sizing: border-box;
    }

    /* 이미지 속 어두운 남색 버튼 위에 딱 겹쳐질 진짜 버튼 */
    .real-submit-btn {
      width: 100%;
      height: 48px;
      background-color: #0f1a2c; /* 원본 버튼 색상과 맞춤 */
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!-- 투명하게 얹어지는 진짜 시트몽키 입력창 구역 -->
  <div class="form-overlay">
    
    <!-- ⚠️ 여기에 사장님의 진짜 시트몽키 주소를 넣어주세요 -->
    <form action="https://api.sheetmonkey.io/form/awkDjKAMY3DeQ2XfPre6J6" method="POST" onsubmit="alert('제출되었습니다');">
      
      <div class="input-row">
        <input type="text" name="성함" class="real-input" placeholder="성함을 입력해주세요" required>
        <input type="tel" name="전화번호" class="real-input" placeholder="연락처를 입력해주세요" required>
      </div>
      
      <button type="submit" class="real-submit-btn">
        무료 상담 신청하기 &rarr;
      </button>
      
    </form>
    
  </div>

</body>
</html>
