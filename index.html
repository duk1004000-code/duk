<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신용카드 현금화 안전하고 빠르게</title>
  <style>
    /* 1. 배경 이미지 설정 */
    body {
      background-image: url('bg.png'); /* 1단계에서 올린 이미지 파일명과 같아야 합니다 */
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      margin: 0;
      padding: 0;
      font-family: 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    /* 2. 하단 입력창 박스 디자인 */
    .form-container {
      position: absolute;
      bottom: 5%; /* 화면 하단에서의 높이 조절 */
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1200px;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }

    /* 입력창 가로 정렬 */
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 14px;
      font-weight: bold;
      color: #333333;
    }

    .input-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background-color: #f9f9f9;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1a2536;
      background-color: #ffffff;
    }

    /* 3. 무료 상담 신청하기 버튼 디자인 */
    .submit-btn {
      height: 48px;
      background-color: #1a2536; /* 이미지와 유사한 어두운 네이비 */
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 0 28px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background-color: #2c3a4e;
    }

    /* 4. 하단 안내 문구 */
    .notice {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #666666;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <form action="https://formspree.io/f/XXXXXX" method="POST">
      
      <div class="input-group">
        <label>성함</label>
        <input type="text" name="성함" placeholder="성함을 입력해주세요" required>
      </div>
      
      <div class="input-group">
        <label>연락처</label>
        <input type="tel" name="연락처" placeholder="연락처를 입력해주세요" required>
      </div>
      
      <div class="input-group">
        <label>희망금액</label>
        <input type="text" name="희망금액" placeholder="예) 3,000만원" required>
      </div>
      
      <div class="input-group">
        <label>직업</label>
        <input type="text" name="직업" placeholder="직업을 입력해주세요" required>
      </div>
      
      <button type="submit" class="submit-btn">
        무료 상담 신청하기 <span>&rarr;</span>
      </button>
      
    </form>
    <div class="notice">🔒 개인정보는 상담 목적으로만 이용되며, 안전하게 보호됩니다.</div>
  </div>

</body>
</html>
