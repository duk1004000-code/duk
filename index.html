<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신용카드 현금화 안전하고 빠르게</title>
  <style>
    /* 1. 웹페이지 전체 화면 설정 및 배경 이미지 고정 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
    }

    body {
      background-color: #f6ebd9; /* 이미지가 안 나올 때를 대비한 기본 베이지 톤 배경색 */
      background-image: url('bg.png'); /* 깃허브에 올린 이미지 파일명 */
      background-repeat: no-repeat;
      background-position: center top;
      background-size: contain; /* 이미지 비율을 유지하며 가로 화면에 맞춤 */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* 입력창을 화면 하단에 배치 */
      align-items: center;
    }

    /* 2. 하단 입력창 박스 디자인 */
    .form-container {
      width: 90%;
      max-width: 1000px;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
      margin-bottom: 40px; /* 화면 맨 밑바닥에서 살짝 띄우기 */
    }

    /* 입력창 가로 정렬 */
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 14px;
      font-weight: bold;
      color: #333333;
    }

    .input-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background-color: #f9f9f9;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1a2536;
      background-color: #ffffff;
    }

    /* 3. 무료 상담 신청하기 버튼 디자인 */
    .submit-btn {
      height: 48px;
      background-color: #1a2536; 
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 0 32px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background-color: #2c3a4e;
    }

    /* 4. 하단 안내 문구 */
    .notice {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #666666;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <form action="https://api.sheetmonkey.io/form/awkDjKAMY3DeQ2XfPre6J6" method="POST">
      
      <div class="input-group">
        <label>성함</label>
        <input type="text" name="성함" placeholder="성함을 입력해주세요" required>
      </div>
      
      <div class="input-group">
        <label>연락처</label>
        <input type="tel" name="전화번호" placeholder="연락처를 입력해주세요" required>
      </div>
      
      <button type="submit" class="submit-btn">
        무료 상담 신청하기 <span>&rarr;</span>
      </button>
      
    </form>
    <div class="notice">🔒 개인정보는 상담 목적으로만 이용되며, 안전하게 보호됩니다.</div>
  </div>

</body>
</html>
