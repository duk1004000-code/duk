<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신용카드 현금화 빠르고 안전하게</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f6ebd9;
    }

    /* 1. 하단 입력창이 잘리지 않도록 배경 이미지 설정 */
    body {
      background-image: url('bg_mobile.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: contain;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* 입력창을 화면 하단으로 배치 */
      align-items: center;
      box-sizing: border-box;
    }

    /* 2. 실제 입력창들이 들어가는 깔끔한 흰색 상자 박스 */
    .form-container {
      width: 85%;
      max-width: 340px; /* 화면이 커져도 늘어나지 않게 고정 */
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      box-sizing: border-box;
      margin-bottom: 30px; /* 화면 맨 밑바닥과의 여백 */
    }

    form {
      display: flex;
      flex-direction: column; /* 세로형 한 칸씩 쌓기 ⭐️ */
      gap: 12px;
      width: 100%;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 13px;
      font-weight: bold;
      color: #333333;
    }

    .real-input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      background-color: #f9f9f9;
      box-sizing: border-box;
    }

    .real-input:focus {
      outline: none;
      border-color: #1a2536;
      background-color: #ffffff;
    }

    /* 3. 진짜 무료 상담 신청하기 버튼 */
    .real-submit-btn {
      width: 100%;
      height: 46px;
      background-color: #1a2536; /* 고급스러운 남색 버튼 */
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
      margin-top: 4px;
    }

    .real-submit-btn:hover {
      background-color: #2c3a4e;
    }

    /* 4. 하단 안내 문구 */
    .notice {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #666666;
    }
  </style>
</head>
<body>

  <!-- 새 이미지 위에 깔끔하게 얹어지는 실제 입력창 구역 -->
  <div class="form-container">
    
    <!-- ⚠️ 여기에 사장님의 진짜 시트몽키 주소를 넣어주세요 -->
    <form action="https://api.sheetmonkey.io/form/awkDjKAMY3DeQ2XfPre6J6" method="POST" onsubmit="alert('제출되었습니다');">
      
      <div class="input-group">
        <label>성함</label>
        <input type="text" name="성함" class="real-input" placeholder="성함을 입력해주세요" required>
      </div>
      
      <div class="input-group">
        <label>전화번호</label>
        <input type="tel" name="전화번호" class="real-input" placeholder="연락처를 입력해주세요" required>
      </div>
      
      <button type="submit" class="real-submit-btn">
        무료 상담 신청하기 &rarr;
      </button>
      
    </form>
    
    <div class="notice">🔒 개인정보는 안전하게 보호됩니다.</div>
  </div>

</body>
</html>
